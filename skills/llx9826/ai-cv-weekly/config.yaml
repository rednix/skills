# LunaClaw Brief — Global Configuration
# Sensitive info goes in config.local.yaml (gitignored)

brand:
  name: "ClawCat"
  full_name: "ClawCat Brief"
  tagline: "AI-Powered Report Engine"
  author: "by llx & Luna"

llm:
  base_url: "https://coding.dashscope.aliyuncs.com/v1"
  model: "kimi-k2.5"
  timeout: 180
  # api_key: put in config.local.yaml or env BAILIAN_API_KEY

github:
  token: ""  # put in config.local.yaml or env GITHUB_TOKEN

proxy:
  enabled: false
  http: ""
  https: ""

# Data source configuration
sources_config:
  rss:
    max_per_feed: 10
    feeds:
      # Tech
      - url: "https://feeds.arstechnica.com/arstechnica/technology-lab"
        label: "Ars Technica"
      - url: "https://www.wired.com/feed/rss"
        label: "Wired"
      - url: "https://techcrunch.com/feed/"
        label: "TechCrunch"
      - url: "https://www.theverge.com/rss/index.xml"
        label: "The Verge"
      - url: "https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml"
        label: "NYT Tech"
      # Finance (enriched via openclaw-feeds catalog)
      - url: "https://feeds.bloomberg.com/markets/news.rss"
        label: "Bloomberg"
      - url: "https://feeds.content.dowjones.io/public/rss/mw_topstories"
        label: "MarketWatch"
      - url: "https://www.cnbc.com/id/100003114/device/rss/rss.html"
        label: "CNBC"
      - url: "https://www.ft.com/?format=rss"
        label: "Financial Times"
      - url: "https://feeds.reuters.com/reuters/businessNews"
        label: "Reuters Business"
  skill:
    timeout: 30
    skills: []
    # Example: use @nesdeq/openclaw-feeds for 26+ finance RSS feeds
    # - name: "@nesdeq/openclaw-feeds"
    #   function: "fetch_feeds"
    #   params:
    #     category: "finance"
    #     limit: 30

email:
  smtp_host: "smtp.qq.com"
  smtp_port: 465
  sender_email: ""
  password: ""       # put in config.local.yaml or env EMAIL_PASSWORD
  to_emails: []

# Scheduled auto-generation (used by `python -m brief.scheduler`)
# Each job specifies a preset, cron expression, and delivery channels.
# Cron format: minute hour day month weekday (0=Sun, 1=Mon, ..., 6=Sat)
schedule: []
  # Example:
  # - preset: stock_a_daily
  #   cron: "0 18 * * 1-5"
  #   delivery:
  #     - type: email
  #     - type: webhook
  #       url: "https://hooks.slack.com/services/xxx"
  #       webhook_type: slack
  # - preset: ai_cv_weekly
  #   cron: "0 9 * * 1"
  #   delivery:
  #     - type: email
